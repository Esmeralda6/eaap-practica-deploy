name: Deploy to Production

on:
  push:
    branches: [ main ] # Solo se activa cuando hay cambios reales en main

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    # Este job solo corre si el de build pasó (opcional si están en archivos separados)
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Step
        run: |
          echo "Desplegando la aplicación en el servidor..."
          # Aquí irían los comandos reales de despliegue, por ejemplo:
          # docker push mi-registro/mi-app:latest
          # o comandos de AWS/Vercel/Heroku
          echo "Despliegue finalizado con éxito."